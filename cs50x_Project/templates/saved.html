<!DOCTYPE html>
<html>
<head>
    <title>Saved Graph</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>
<body>
<h1>Saved Graph</h1>
<div id="mynetwork" style="width: 800px; height: 400px; border:1px solid lightgray;"></div>
<br>
<a href="/">Back</a>
<script type="text/javascript">
    var nodes = [];
    var edges = [];
    var added = {};
    {% for r in rows %}
        if (!added['{{ r[0] }}']) {
            nodes.push({id:'{{ r[0] }}', label:'{{ r[0] }}'});
            added['{{ r[0] }}'] = true;
        }
        if (!added['{{ r[1] }}']) {
            nodes.push({id:'{{ r[1] }}', label:'{{ r[1] }}'});
            added['{{ r[1] }}'] = true;
        }
        edges.push({from:'{{ r[0] }}', to:'{{ r[1] }}'});
    {% endfor %}
    var container = document.getElementById('mynetwork');
    var data = { nodes: nodes, edges: edges };
    var options = { nodes: {shape:'box', color:'#ADD8E6'}, edges:{arrows:'to'}, physics:{enabled:true} };
    var network = new vis.Network(container, data, options);
</script>
</body>
</html>
